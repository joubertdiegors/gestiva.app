{% extends "base.html" %}
{% load i18n %}

{% block title %}Novo dia de planning — {{ project.name }}{% endblock %}

{% block breadcrumb %}
  <a href="{% url 'planning:list' %}">Planning</a>
  <span class="sep">›</span>
  <a href="{% url 'planning:list' %}?project={{ project.pk }}">{{ project.name }}</a>
  <span class="sep">›</span>
  <span class="current">Novo dia</span>
{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Novo dia de planning</h1>
    <p class="page-sub">{{ project.name }}</p>
  </div>
</div>

<div class="card" style="max-width:480px; padding:28px 32px;">
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Data</label>
      <input type="date" name="date" class="form-control" required
             value="{% now 'Y-m-d' %}">
    </div>
    <div class="form-group">
      <label class="form-label">Notas (opcional)</label>
      <textarea name="notes" class="form-control" rows="3"
                placeholder="Observações sobre este dia..."></textarea>
    </div>
    <div style="display:flex; gap:10px; margin-top:8px;">
      <button type="submit" class="btn btn-primary">Criar dia</button>
      <a href="{% url 'planning:list' %}?project={{ project.pk }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
